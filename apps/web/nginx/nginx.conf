pid               /var/run/nginx.pid;
user              nginx;
worker_processes  auto;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # exclude requests with HTTP status codes 2xx (Success) and 3xx (Redirection)
  map $status $loggable {
    ~^[23]  0;
    default 1;
  }

  access_log  /var/log/nginx/access.log combined if=$loggable;
  access_log  /dev/stdout               combined if=$loggable;
  error_log   /var/log/nginx/error.log;
  error_log   /dev/stderr;

  log_format  client_error_format '[$time_iso8601] referrer: "$http_referer", error: "$request_body"';

  # directly copy data from one file descriptor to another eliminating the middle-step of copying data in and from the buffer
  sendfile on;

  # Gzip compression
  gzip_static on;
  gzip on;
  gzip_disable "msie6";
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    application/javascript
    application/json
    application/rss+xml
    application/wasm
    application/x-javascript
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  # template files in /etc/nginx/templates/*.template are output as a result of executing envsubst to the /etc/nginx/conf.d folder
  include /etc/nginx/conf.d/*.conf;
}
