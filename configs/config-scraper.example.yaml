# Node environment (development|production)
nodeEnv:

# Port for the app to run on
port:

# Redis - message queue
redis:
  # name of the Redis Docker container
  host:
  port:

# Services offering music event tickets
services:
  # Ticketmaster for developers: https://developer.ticketmaster.com/
  ticketmaster:
    # at what time should scraping start each day, except the first/initial day (ISO 8601 time "HH:MM:SS")
    scheduledTime:
    # base URL for the Ticketmaster Discovery API: https://developer.ticketmaster.com/products-and-docs/apis/discovery-api/v2/
    url:
    # get your API key here: https://developer-acct.ticketmaster.com/user/login
    apiKey:

  # GoOut
  goout:
    # at what time should scraping start each day, except the first/initial day (ISO 8601 time "HH:MM:SS")
    scheduledTime:
    # base URL of the GoOut - cs/en localization supported
    url:

  # Ticketportal
  ticketportal:
    # at what time should scraping start each day, except the first/initial day (ISO 8601 time "HH:MM:SS")
    scheduledTime:
    # base URL of the Ticketportal
    url:
