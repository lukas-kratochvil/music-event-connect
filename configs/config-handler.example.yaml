# Node environment (development|production)
nodeEnv:

# Port for the app to run on
port:

# Redis - cache and message queue
redis:
  # name of the Redis Docker container
  host:
  port:
  cache:
    # time-to-live (TTL) in seconds that each record will last in cache (0 = infinite)
    ttl:

# Triple store
tripleStore:
  # full SPARQL read endpoint URL - as the URL hostname use the triple store Docker container name and its port (https://nodejs.org/api/url.html#url-strings-and-url-objects)
  endpointUrl:
  # full SPARQL update endpoint URL - as the URL hostname use the triple store Docker container name and its port (https://nodejs.org/api/url.html#url-strings-and-url-objects)
  updateUrl:
  # authorization
  user:
  password:

# LocationIQ geocoding: https://my.locationiq.com/dashboard
locationIQ:
  # base URL for the LocationIQ API
  url:
  # get your API key here: https://my.locationiq.com/dashboard#accesstoken
  apiKey:
